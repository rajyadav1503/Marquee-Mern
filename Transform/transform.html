    section > img {
    /* Clear the hardcoded transform so the animation takes over completely */
    animation: rotate-ball 2s linear infinite; 
}

@keyframes rotate-ball {
    /* Corner 1: Top Left (Start) */
    0% {
        transform: translate(0, 0) rotate(0deg) scale(1.2);
        filter: blur(0px) grayscale(0%);
    }
    21% { transform: translate(27rem, 0) rotate(75deg) scale(1.1); }
    
    /* ROUNDED TOP RIGHT TURN */
    25% { transform: translate(30rem, 3rem) rotate(90deg) scale(1.1); }
   46% { transform: translate(30rem, 27rem) rotate(165deg) scale(1.1); }

    /* ROUNDED BOTTOM RIGHT TURN */
    50% { transform: translate(27rem, 30rem) rotate(180deg) scale(1.1); filter: blur(0px) grayscale(0%); }
    /* Corner 4: Bottom Left */
   
     /* Bottom Edge Travel */
    71% { transform: translate(3rem, 30rem) rotate(255deg) scale(1.1); }

    /* ROUNDED BOTTOM LEFT TURN (Filters start taking effect) */
    75% { 
        transform: translate(0, 27rem) rotate(270deg) scale(1.1); 
        filter: blur(5px) grayscale(100%);
    }
   
      /* Left Edge Travel */
    96% { transform: translate(0, 3rem) rotate(345deg) scale(1.2); }

    /* BACK TO TOP LEFT (Seamless Loop) */
    100% {
        transform: translate(0, 0) rotate(360deg) scale(1.2);
        filter: blur(0px) grayscale(0%); 
    }
}

    </style>

<body>

    </section>
