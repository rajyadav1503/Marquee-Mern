<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Photoblink.css" />
  </head>
  <body>
    <div class="photo">
      <div class="about">
        <div class="photo-section">
          <div class="profile-pic">
            <img src="download.jpg" alt="" />
            <div class="blinklogo"></div>
          </div>
        </div>

        <div class="about-section">
          <div class="name">
            <h2>MS DHONI</h2>
            <p>Indian Cricketer</p>
          </div>

          <div class="social">
            <div class="post">
              <p>100</p>
              <h4>POSTS</h4>
            </div>
            <div class="followers">
              <p>20 Million</p>
              <h4>Followers</h4>
            </div>
            <div class="following">
              <p>2</p>
              <h4>Following</h4>
            </div>
          </div>

          <div class="buttons">
            <div class="follow-button">
              <p>FOLLOW</p>
            </div>
            <div class="message-button">
              <p>MESSAGE</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
