<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css"
      integrity="sha512-WxpJXPm/Is1a/dzEdhdaoajpgizHQimaLGL/QqUIAjIihlQqlPQb1V9vkGs9+VzXD7rgI6O+UsSKl4u5K36Ydw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Corrected Bootstrap Icons Link -->
    <head>
      <!-- Place this link inside your head tag -->
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
      />
    </head>
  </head>
  <body>
    <div class="container">
      <!-- Side Bar -->
      <aside>
        <div class="sidebar-top">
          <div class="sidebar-top-logo">
            <img
              src="AdminLTELogo.png"
              alt="AdminLTE Logo"
              class="brand-image opacity-75 shadow"
            />
          </div>
          <div class="side-bar-top-logo-name">
            <span>AdminLTE 4</span>
          </div>
        </div>

        <div class="sidebar-sections">
          <div class="sidebar-section1">
            <div class="sidebar-section1-option-1">
              <div class="dashboard">
                <i class="nav-icon bi bi-speedometer"></i>
                <span>Dashboard</span>
              </div>
              <div class="Arrow">
                <i class="nav-arrow bi bi-chevron-right"></i>
              </div>
            </div>
            <div class="sidebar-section1-option-2">
              <i class="nav-icon bi bi-palette"></i>
              <span>Theme Generate</span>
            </div>
            <div class="sidebar-section1-option-3">
              <div class="widgets">
                <i class="nav-icon bi bi-box-seam-fill"></i>
                <span>Widgets</span>
              </div>
              <div class="Arrow">
                <i class="nav-arrow bi bi-chevron-right"></i>
              </div>
            </div>
            <div class="sidebar-section1-option-4">
              <div class="layout-options">
              <i class="nav-icon bi bi-envelope"></i>
              <span>Layout Options</span>
            </div>
            <div class="Arrow">
              <i class="nav-arrow bi bi-chevron-right"></i>
            </div>
            </div>
            

            <div class="sidebar-section1-option-5">
              <div class="elements">
              <i class="nav-icon bi bi-tree-fill"></i>
              <span>UI Elements</span>
            </div>
            <div class="Arrow">
              <i class="nav-arrow bi bi-chevron-right"></i>
            </div>
            </div>
            
            <div class="sidebar-section1-option-6">
              <div class="mail-box">
              <i class="nav-icon bi bi-envelope"></i>
              <span>MailBox</span>
            </div>
            <div class="Arrow">
              <i class="nav-arrow bi bi-chevron-right"></i>
            </div>
            </div>
            
            <div class="sidebar-section1-option-7">
              <div class="forms">
              <i class="fa-regular fa-pen-to-square" style="color: #cccdcf"></i>
              <span>Forms</span>
            </div>
            <div class="Arrow">
              <i class="nav-arrow bi bi-chevron-right"></i>
            </div>
            </div>
            
            <div class="sidebar-section1-option-8">
              <div class="tables">
              <i class="fa-solid fa-table-cells" style="color: #cccdcf"></i>
              <span>Tables</span>
            </div>
            <div class="Arrow">
              <i class="nav-arrow bi bi-chevron-right"></i>
            </div>
            </div>
            
          </div>
          <div class="sidebar-section2">
            <h3>Pages</h3>
            <div class="sidebar-section2-Pages">
              <div class="pages">
                <i class="fa-regular fa-file-lines" style="color: #cccdcf"></i>
                <span>Pages</span>
              </div>
              <div class="Arrow">
                <i class="nav-arrow bi bi-chevron-right"></i>
              </div>
            </div>
          </div>
          <div class="sidebar-section3">
            <h3>EXAMPLES</h3>
            <div class="sidebar-section3-Auth">
              <div class="auth">
                <i
                  class="fa-solid fa-arrow-right-to-bracket"
                  style="color: #cccdcf"
                ></i>
                <span>Auth</span>
              </div>

              <div class="Arrow">
                <i class="nav-arrow bi bi-chevron-right"></i>
              </div>
            </div>
          </div>
          <div class="sidebar-section4">
            <p>MULTI LEVEL EXAMPLE</p>
            <div class="sidebar-section4-Levels">
              <ul>
                <li>Level 1</li>
                <li>Level 2</li>
                <li>Level 3</li>
              </ul>
            </div>
          </div>
          <div class="sidebar-section5">
            <p>LABELS</p>
            <div class="sidebar-section5-labels">
              <ul>
                <li>
                  <i class="nav-icon bi bi-circle text-danger"></i> Important
                </li>
                <li></li>
                <li>
                  <i class="nav-icon bi bi-circle text-danger"></i> Warning
                </li>
                <li></li>
                <li>
                  <i class="nav-icon bi bi-circle text-danger"></i>
                  Informational
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div class="sidebar-bottom">
          <div class="sidebar-bottom-box">
            <i class="bi bi-book me-1" aria-hidden="true"></i>
            <span>View Documentation</span>
          </div>
        </div>
      </aside>

      <!-- Main section -->
      <main>
        <h1>Main</h1>
      </main>

      <!-- Right Side -->
      <div class="right-Side">
        <h1>Right side</h1>
      </div>
    </div>
  </body>
</html>
